<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate & OP シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; height: 100vh; display: flex; flex-direction: column; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem; }
        input { width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.375rem; font-size: 0.875rem; }
        .time-input { text-align: center; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="overflow-hidden">
    <header class="bg-white border-b border-slate-200 px-6 py-3 shrink-0 flex items-center justify-between">
        <div>
            <h1 class="text-xl font-bold text-slate-800">Rate & OP シミュレーター</h1>
            <p class="text-slate-500 text-xs">人口分布グラフ & レート解析</p>
        </div>
        <div class="flex items-center gap-3">
            <label class="cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-2 px-4 rounded-lg transition-colors shadow-sm">
                JSONを読み込む
                <input type="file" id="jsonInput" accept=".json" class="hidden">
            </label>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- 左サイド：パラメータ設定 -->
        <aside class="w-64 bg-white border-r border-slate-200 p-5 overflow-y-auto shrink-0 shadow-sm">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-5 flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                設定
            </h2>
            
            <div class="mb-6 pb-6 border-b border-slate-100">
                <label>Top Time (h:m:s)</label>
                <div class="grid grid-cols-3 gap-1">
                    <input type="number" id="t_hr" value="3" min="0" class="time-input px-1">
                    <input type="number" id="t_min" value="18" min="0" max="59" class="time-input px-1">
                    <input type="number" id="t_sec" value="50" min="0" max="59" class="time-input px-1">
                </div>
                <div id="total_time_display" class="text-[10px] text-right mt-2 text-blue-600 font-mono font-bold">11930s</div>
            </div>

            <div class="space-y-4">
                <div class="input-group"><label>Base Rate</label><input type="number" id="base_rate" value="1000"></div>
                <div class="input-group"><label>Multiplier</label><input type="number" id="multiplier" value="500"></div>
                <div class="input-group"><label>OP Score</label><input type="number" id="op_score" value="100"></div>
                <div class="input-group"><label>Rate Border (%)</label><input type="number" id="rate_border" value="20" step="0.1"></div>
                <div class="input-group"><label>OP Border (%)</label><input type="number" id="op_border" value="5" step="0.1"></div>
            </div>
        </aside>

        <!-- 中央：人口分布グラフ -->
        <section class="w-80 bg-slate-50 border-r border-slate-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-200 bg-white">
                <h2 class="text-xs font-bold text-slate-700 uppercase flex items-center">
                    <svg class="w-4 h-4 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    人口分布 (JSON)
                </h2>
            </div>
            <div class="flex-1 p-4 relative">
                <div id="distPlaceholder" class="absolute inset-0 flex items-center justify-center text-slate-400 text-xs italic p-10 text-center">JSONを読み込むと分布が表示されます</div>
                <canvas id="distChart"></canvas>
            </div>
            <div class="p-3 bg-white border-t border-slate-200">
                <div id="distSummary" class="text-[10px] text-slate-500 font-medium">データ未読込</div>
            </div>
        </section>

        <!-- 右サイド：メイングラフ & シミュレーション結果 -->
        <section class="flex-1 p-6 overflow-y-auto space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-slate-700">レート・OP推移</h3>
                    <div class="flex gap-4 text-[10px] font-bold">
                        <span class="flex items-center text-blue-600"><span class="w-2 h-2 bg-blue-500 rounded-full mr-1"></span> Rate</span>
                        <span class="flex items-center text-orange-600"><span class="w-2 h-2 bg-orange-500 rounded-full mr-1"></span> OP</span>
                    </div>
                </div>
                <div class="relative h-[250px]">
                    <canvas id="rateChart"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 class="text-sm font-bold text-slate-700">シミュレーション統計</h3>
                    <span id="data_source_label" class="text-[10px] px-2 py-1 bg-white border border-slate-200 text-slate-500 rounded font-bold">Simulation Only</span>
                </div>
                
                <div id="stats_container" class="grid grid-cols-3 divide-x divide-slate-100 border-b border-slate-100 bg-white">
                    <div class="px-6 py-4 text-center">
                        <div class="text-[10px] text-slate-400 font-bold uppercase mb-1">Total Runs</div>
                        <div id="stat_total" class="text-xl font-black text-slate-700 font-mono">-</div>
                    </div>
                    <div class="px-6 py-4 text-center">
                        <div class="text-[10px] text-orange-400 font-bold uppercase mb-1">OP クリア</div>
                        <div id="stat_op" class="text-xl font-black text-orange-600 font-mono">-</div>
                    </div>
                    <div class="px-6 py-4 text-center">
                        <div class="text-[10px] text-blue-400 font-bold uppercase mb-1">Rate クリア</div>
                        <div id="stat_rate" class="text-xl font-black text-blue-600 font-mono">-</div>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-slate-50 text-slate-500 font-bold border-b border-slate-100">
                            <tr>
                                <th class="px-6 py-3">Time</th>
                                <th class="px-6 py-3">比率 (%)</th>
                                <th class="px-6 py-3 text-blue-600 text-right">Rate</th>
                                <th class="px-6 py-3 text-orange-600 text-right">OP</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable" class="divide-y divide-slate-50 font-mono text-xs">
                            <!-- JS挿入箇所 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        let rateChart, distChart;
        let jsonData = null;

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 100);
            return `${h > 0 ? h + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
        }

        // 最新の計算式 (Weight = Percent^2)
        function calcRate(base_rate, multiplier, time, top_time, op_border, rate_border) {
            const ratio = time / top_time;
            if (ratio < 1 + rate_border / 100) {
                if (ratio < 1 + op_border / 100) return base_rate + multiplier;
                const diff = (time / top_time) * 100 - 100;
                const percent = (rate_border - diff) / (rate_border - op_border);
                const weight = Math.pow(percent, 2);
                return base_rate + multiplier * weight;
            }
            return base_rate;
        }

        function calcOp(time, top_time, op_border, op_score) {
            const ratio = time / top_time;
            if (ratio < 1 + op_border / 100) {
                const diff = (time / top_time) * 100 - 100;
                const percent = (op_border - diff) / op_border;
                return op_score * percent;
            }
            return 0;
        }

        document.getElementById('jsonInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    jsonData = Array.isArray(data) ? data[0] : data;
                    const validRuns = jsonData.runs.filter(r => !r.banned);
                    if (validRuns.length > 0) {
                        const minTime = Math.min(...validRuns.map(r => r.time));
                        document.getElementById('t_hr').value = Math.floor(minTime / 3600);
                        document.getElementById('t_min').value = Math.floor((minTime % 3600) / 60);
                        document.getElementById('t_sec').value = minTime % 60;
                        document.getElementById('distPlaceholder').style.display = 'none';
                        update();
                    }
                } catch (err) { console.error(err); }
            };
            reader.readAsText(file);
        });

        function update() {
            const hr = parseFloat(document.getElementById('t_hr').value) || 0;
            const min = parseFloat(document.getElementById('t_min').value) || 0;
            const sec = parseFloat(document.getElementById('t_sec').value) || 0;
            const top_time = (hr * 3600) + (min * 60) + sec;
            const base_rate = parseFloat(document.getElementById('base_rate').value) || 0;
            const multiplier = parseFloat(document.getElementById('multiplier').value) || 0;
            const op_score = parseFloat(document.getElementById('op_score').value) || 0;
            const rate_border = parseFloat(document.getElementById('rate_border').value) || 0;
            const op_border = parseFloat(document.getElementById('op_border').value) || 0;

            if (top_time <= 0) return;
            document.getElementById('total_time_display').innerText = `${top_time}s (${formatTime(top_time)})`;

            // 表のための比率リスト生成
            let listPercents = [];
            for (let i = 0; i <= rate_border; i += 2) {
                listPercents.push(i);
            }
            // ボーダー値を強制追加
            if (!listPercents.includes(op_border)) listPercents.push(op_border);
            if (!listPercents.includes(rate_border)) listPercents.push(rate_border);
            listPercents.sort((a, b) => a - b);

            const tableRows = [];
            listPercents.forEach(p => {
                const ratio = 1 + (p / 100);
                const t = top_time * ratio;
                const r = calcRate(base_rate, multiplier, t, top_time, op_border, rate_border);
                const o = calcOp(t, top_time, op_border, op_score);
                
                const isOp = Math.abs(p - op_border) < 0.001;
                const isRate = Math.abs(p - rate_border) < 0.001;
                
                let bgClass = "";
                if (isOp) bgClass = "bg-orange-100 font-bold border-l-4 border-orange-500";
                else if (isRate) bgClass = "bg-blue-100 font-bold border-l-4 border-blue-500";

                tableRows.push(`
                    <tr class="${bgClass} hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-2">${formatTime(t)}</td>
                        <td class="px-6 py-2">
                            ${(ratio * 100).toFixed(1)}% 
                            ${isOp ? '<span class="ml-2 text-[8px] bg-orange-500 text-white px-1 rounded">OP BORDER</span>' : ''}
                            ${isRate ? '<span class="ml-2 text-[8px] bg-blue-500 text-white px-1 rounded">RATE BORDER</span>' : ''}
                        </td>
                        <td class="px-6 py-2 text-right text-blue-600">${r.toFixed(1)}</td>
                        <td class="px-6 py-2 text-right text-orange-600">${o.toFixed(1)}</td>
                    </tr>
                `);
            });
            document.getElementById('dataTable').innerHTML = tableRows.join('');

            // グラフ用の広いデータ範囲
            const graphLabels = [];
            const graphRateVals = [];
            const graphOpVals = [];
            for (let p = 0; p <= Math.max(rate_border + 10, 30); p += 1) {
                const ratio = 1 + (p / 100);
                const t = top_time * ratio;
                graphLabels.push(`${p+100}%`);
                graphRateVals.push(calcRate(base_rate, multiplier, t, top_time, op_border, rate_border));
                graphOpVals.push(calcOp(t, top_time, op_border, op_score));
            }

            if (rateChart) {
                rateChart.data.labels = graphLabels;
                rateChart.data.datasets[0].data = graphRateVals;
                rateChart.data.datasets[1].data = graphOpVals;
                rateChart.update();
            } else {
                rateChart = new Chart(document.getElementById('rateChart'), {
                    type: 'line',
                    data: {
                        labels: graphLabels,
                        datasets: [
                            { label: 'Rate', data: graphRateVals, borderColor: '#3b82f6', tension: 0.3, yAxisID: 'y' },
                            { label: 'OP', data: graphOpVals, borderColor: '#f97316', tension: 0.1, yAxisID: 'y1' }
                        ]
                    },
                    options: {
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { position: 'left' }, y1: { position: 'right', grid: { drawOnChartArea: false } } }
                    }
                });
            }

            if (jsonData) {
                const validRuns = jsonData.runs.filter(r => !r.banned);
                const total = validRuns.length;
                let opC = 0, rateC = 0;
                const bins = {};
                const binStep = 2;
                for (let i = 100; i <= 150; i += binStep) bins[i] = 0;

                validRuns.forEach(run => {
                    const ratioPercent = (run.time / top_time) * 100;
                    const binKey = Math.floor(ratioPercent / binStep) * binStep;
                    if (bins[binKey] !== undefined) bins[binKey]++;
                    if (ratioPercent <= 100 + op_border + 0.001) opC++;
                    if (ratioPercent <= 100 + rate_border + 0.001) rateC++;
                });

                document.getElementById('stat_total').innerText = total;
                document.getElementById('stat_op').innerHTML = `${opC} <span class="text-[10px] font-normal">(${((opC/total)*100).toFixed(1)}%)</span>`;
                document.getElementById('stat_rate').innerHTML = `${rateC} <span class="text-[10px] font-normal">(${((rateC/total)*100).toFixed(1)}%)</span>`;
                document.getElementById('data_source_label').innerText = `Linked: ${jsonData.name_ideal || 'JSON'}`;

                const distLabels = Object.keys(bins).map(k => k + '%');
                const distData = Object.values(bins);

                if (distChart) {
                    distChart.data.labels = distLabels;
                    distChart.data.datasets[0].data = distData;
                    distChart.update();
                } else {
                    distChart = new Chart(document.getElementById('distChart'), {
                        type: 'bar',
                        data: {
                            labels: distLabels,
                            datasets: [{ label: '人数', data: distData, backgroundColor: '#818cf8', borderRadius: 4 }]
                        },
                        options: {
                            indexAxis: 'y',
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: { x: { grid: { display: false } }, y: { grid: { display: false } } }
                        }
                    });
                }
            }
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
        window.onload = update;
    </script>
</body>
</html>
