name: Daily Data Update

on:
  schedule:
    - cron: '0 15 * * *' # 日本時間の午前0時（UTC 15:00）に毎日実行
  workflow_dispatch:      # ボタンで手動実行もできるようにする

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # プライベートリポジトリで書き込みを行うために必要
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Run daily script
        env:
          # GitHubに保存した秘密の値を、実行時の環境変数にセットする
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # --env フラグは不要（GitHubが直接環境変数に注入するため）
          deno run --allow-net --allow-read --allow-write --allow-env daily.ts

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 差分がある場合のみコミット
          if ! git diff --cached --exit-code --quiet; then
            git commit -m "Update: $(date +'%Y-%m-%d') data results"
            git push
          else
            echo "No changes to commit"
          fi